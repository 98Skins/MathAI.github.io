<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokalny AI Koder - System Realnej Wiedzy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0f3460;
            color: #333;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
        }
        .container {
            background: #fff; width: 100%; max-width: 1300px; height: 850px;
            display: flex; flex-direction: column; border-radius: 15px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .header { background: #16213e; color: #e94560; padding: 15px; text-align: center; font-weight: bold; border-bottom: 4px solid #e94560; }
        
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        
        /* PANEL CZATU */
        .chat-panel { flex: 2; display: flex; flex-direction: column; background: #f4f4f9; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .message { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.5; position: relative; }
        .message.ai { background: #e2e2e2; align-self: flex-start; border-bottom-left-radius: 2px; }
        .message.user { background: #e94560; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        
        .code-block { 
            background: #1e1e1e; color: #dcdcdc; padding: 10px; border-radius: 8px; 
            font-family: 'Consolas', monospace; margin-top: 8px; display: block; overflow-x: auto;
            border-left: 4px solid #e94560; font-size: 13px;
        }

        .input-bar { padding: 20px; background: white; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        textarea { flex: 1; height: 50px; padding: 12px; border: 1px solid #ccc; border-radius: 8px; resize: none; }

        /* PANEL ADMINA */
        .admin-panel { flex: 1; background: #f8f9fa; border-left: 2px solid #ddd; display: flex; flex-direction: column; padding: 20px; }
        .admin-content { display: none; flex-direction: column; gap: 15px; height: 100%; }
        .admin-content.active { display: flex; }
        
        .section-title { font-size: 12px; font-weight: bold; color: #555; text-transform: uppercase; margin-top: 10px; }
        input, .admin-textarea { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc; margin-bottom: 5px; font-size: 13px; }
        .admin-textarea { height: 100px; resize: vertical; }

        .db-list { flex: 1; overflow-y: auto; background: white; border: 1px solid #ddd; border-radius: 8px; margin-top: 10px; }
        .db-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; font-size: 12px; }

        .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; }
        .btn-blue { background: #0f3460; }
        .btn-green { background: #28a745; }
        .btn-red { background: #e94560; }
        .btn-small { padding: 4px 8px; font-size: 10px; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .status-dot { height: 10px; width: 10px; background-color: #28a745; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">🤖 AI KODER - SYSTEM REALNEJ WIEDZY</div>
    
    <div class="main-layout">
        <div class="chat-panel">
            <div class="chat-area" id="chatArea"></div>
            <div class="input-bar">
                <textarea id="userInput" placeholder="Wklej kod HTML lub zadaj pytanie..."></textarea>
                <button class="btn btn-blue" onclick="sendMessage()">Wyślij</button>
            </div>
        </div>

        <div class="admin-panel">
            <div id="loginView">
                <h3 style="margin-bottom:15px">Zaloguj do Systemu</h3>
                <input type="password" id="adminPass" placeholder="Hasło (213005789Qu#@)">
                <button class="btn btn-blue" style="width:100%" onclick="login()">Zaloguj</button>
            </div>

            <div id="adminView" class="admin-content">
                <div style="font-size:13px; margin-bottom:10px;"><span class="status-dot"></span> System gotowy do nauki.</div>
                
                <div class="section-title">Metoda 1: Szybka Nauka (Wklej tekst)</div>
                <input type="text" id="pasteTitle" placeholder="Temat (np. JavaScript pętle)">
                <textarea class="admin-textarea" id="pasteContent" placeholder="Skopiuj i wklej tutaj treść ze strony (np. z Wikipedii)..."></textarea>
                <button class="btn btn-green" onclick="learnFromPaste()">ANALIZUJ I ZAPAMIĘTAJ</button>

                <div class="section-title">Baza Wiedzy</div>
                <div class="db-list" id="dbList"></div>
                
                <div style="display:flex; gap:5px; margin-top:10px">
                    <button class="btn btn-blue btn-small" style="flex:1" onclick="exportData()">EKSPORTUJ</button>
                    <button class="btn btn-red btn-small" style="flex:1" onclick="clearData()">WYCZYŚĆ</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Inicjalizacja bazy (z localStorage)
    let db = JSON.parse(localStorage.getItem('local_ai_knowledge')) || [
        { keywords: ["siema", "cześć"], response: "Cześć! Jestem Twoim lokalnym asystentem. Możesz mnie uczyć wklejając teksty w panelu obok!" }
    ];

    const ADMIN_PASS = "213005789Qu#@";

    // --- LOGOWANIE ---
    function login() {
        if(document.getElementById('adminPass').value === ADMIN_PASS) {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('adminView').classList.add('active');
            updateDBList();
        } else {
            alert("Niepoprawne hasło!");
        }
    }

    // --- NAUKA PRZEZ WKLEJANIE (NIEZAWODNA) ---
    function learnFromPaste() {
        const title = document.getElementById('pasteTitle').value.trim();
        const content = document.getElementById('pasteContent').value.trim();

        if(!title || !content) return alert("Podaj temat i wklej treść!");

        const newEntry = {
            keywords: title.toLowerCase().split(' '),
            response: `Informacje o "${title}":\n${content.substring(0, 1000)}`
        };

        db.push(newEntry);
        saveDB();
        updateDBList();
        
        document.getElementById('pasteTitle').value = '';
        document.getElementById('pasteContent').value = '';
        
        addMsg(`Dodałem nową wiedzę o: <b>${title}</b>. Możesz teraz o to pytać!`, false);
    }

    // --- OBSŁUGA CZATU ---
    function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, true);
        input.value = '';

        setTimeout(() => {
            const response = processInput(text);
            addMsg(response, false);
        }, 500);
    }

    function processInput(input) {
        const cleanInput = input.toLowerCase();

        // 1. Wykrywanie matematyki
        const mathMatch = input.match(/(\d+[\s\+\-\*\/\(\)]+\d+)/);
        if(mathMatch) {
            try { return `Wynik działania to: **${eval(mathMatch[0])}**`; } catch(e) {}
        }

        // 2. Wykrywanie kodu HTML
        if(input.includes('<') && input.includes('>')) {
            return `Wykryłem kod! Oto on:\n<code class="code-block">${escapeHTML(input)}</code>\nAnaliza: Kod wygląda na strukturę HTML. Jeśli chcesz go sprawdzić, zapytaj o konkretny tag.`;
        }

        // 3. Przeszukiwanie bazy wiedzy
        const found = db.find(entry => 
            entry.keywords.some(k => cleanInput.includes(k) && k.length > 2)
        );

        return found ? found.response : "Nie wiem tego jeszcze. Skopiuj tekst na ten temat ze strony i wklej w panelu nauki!";
    }

    function addMsg(content, isUser) {
        const chatArea = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user' : 'ai'}`;
        div.innerHTML = content;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]));
    }

    // --- ZARZĄDZANIE BAZĄ ---
    function updateDBList() {
        const list = document.getElementById('dbList');
        list.innerHTML = db.map((item, index) => `
            <div class="db-item">
                <span>${item.keywords[0]}</span>
                <button class="btn btn-red btn-small" onclick="removeItem(${index})">USUŃ</button>
            </div>
        `).join('');
    }

    function removeItem(index) {
        db.splice(index, 1);
        saveDB();
        updateDBList();
    }

    function saveDB() {
        localStorage.setItem('local_ai_knowledge', JSON.stringify(db));
    }

    function clearData() {
        if(confirm("Czy na pewno usunąć całą wiedzę?")) {
            localStorage.removeItem('local_ai_knowledge');
            location.reload();
        }
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'baza_ai.json';
        a.click();
    }

    window.onload = () => addMsg("System gotowy. Zaloguj się w panelu bocznym, aby zarządzać moją wiedzą.", false);
</script>

</body>
</html>
