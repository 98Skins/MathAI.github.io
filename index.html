<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI KODER PRO - Lokalny Mózg</title>
    <style>
        :root { --main: #e94560; --bg: #1a1a2e; --panel: #16213e; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .app-container {
            background: #fff; width: 100%; max-width: 1200px; height: 800px;
            display: flex; border-radius: 15px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        /* CZAT */
        .chat-section { flex: 2; display: flex; flex-direction: column; background: #f0f2f5; border-right: 2px solid #ddd; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 18px; border-radius: 18px; font-size: 14px; max-width: 80%; line-height: 1.4; }
        .msg.ai { background: #e4e6eb; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg.user { background: var(--main); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .code-box { background: #282c34; color: #abb2bf; padding: 10px; border-radius: 5px; font-family: monospace; display: block; margin: 10px 0; overflow-x: auto; font-size: 12px; }

        .input-area { padding: 20px; background: white; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        textarea { flex: 1; height: 50px; padding: 10px; border: 1px solid #ccc; border-radius: 10px; resize: none; }

        /* PANEL ADMINA */
        .admin-section { flex: 1; background: #f8f9fa; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .admin-content { display: none; }
        .admin-content.active { display: block; }
        
        h3 { color: var(--panel); margin-bottom: 10px; font-size: 16px; border-bottom: 2px solid var(--main); padding-bottom: 5px; }
        input, .big-area { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 10px; font-size: 13px; }
        .big-area { height: 150px; resize: vertical; }

        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-main { background: var(--main); color: white; }
        .btn-dark { background: var(--panel); color: white; }
        .btn:hover { opacity: 0.8; transform: scale(0.98); }

        .db-status { font-size: 11px; background: #eee; padding: 10px; border-radius: 5px; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="chat-section">
        <div class="messages" id="msgBox"></div>
        <div class="input-area">
            <textarea id="uIn" placeholder="Napisz coś lub wklej kod..."></textarea>
            <button class="btn btn-main" style="width: 80px;" onclick="handleSend()">Leć!</button>
        </div>
    </div>

    <div class="admin-section">
        <div id="loginGate">
            <h3>🔐 Panel Wiedzy</h3>
            <input type="password" id="pLock" placeholder="Hasło: 213005789Qu#@">
            <button class="btn btn-dark" onclick="unlock()">Zaloguj</button>
        </div>

        <div id="adminPanel" class="admin-content">
            <h3>🧠 Ucz AI na serio</h3>
            <p style="font-size: 12px; margin-bottom: 10px;">Skopiuj tekst z Wikipedii/MDN i wklej poniżej:</p>
            <input type="text" id="kName" placeholder="Słowo kluczowe (np. JavaScript)">
            <textarea class="big-area" id="kText" placeholder="Tutaj wklej całą treść strony..."></textarea>
            <button class="btn btn-main" onclick="teachAI()">WGRAJ WIEDZĘ</button>
            
            <h3 style="margin-top:20px;">📦 Baza Danych</h3>
            <div id="status" class="db-status">Baza pusta.</div>
            <button class="btn btn-dark" style="margin-top:10px; font-size:10px;" onclick="clearDB()">WYCZYŚĆ WSZYSTKO</button>
        </div>
    </div>
</div>

<script>
    // System przechowywania danych
    let memory = JSON.parse(localStorage.getItem('ai_brain')) || [
        { key: "siema", val: "No witaj! Jestem gotowy na nową wiedzę. Wklej coś w panelu obok!" }
    ];

    const SECRET = "213005789Qu#@";

    function unlock() {
        if(document.getElementById('pLock').value === SECRET) {
            document.getElementById('loginGate').style.display = 'none';
            document.getElementById('adminPanel').classList.add('active');
            refreshStatus();
        } else { alert("Błędne hasło!"); }
    }

    function teachAI() {
        const k = document.getElementById('kName').value.toLowerCase().trim();
        const v = document.getElementById('kText').value.trim();

        if(k && v) {
            memory.push({ key: k, val: v });
            localStorage.setItem('ai_brain', JSON.stringify(memory));
            addMsg(`Nauczyłem się o: <b>${k}</b>. Teraz możesz o to pytać!`, "ai");
            document.getElementById('kName').value = '';
            document.getElementById('kText').value = '';
            refreshStatus();
        }
    }

    function handleSend() {
        const txt = document.getElementById('uIn').value.trim();
        if(!txt) return;

        addMsg(txt, "user");
        document.getElementById('uIn').value = '';

        setTimeout(() => {
            const reply = findAnswer(txt);
            addMsg(reply, "ai");
        }, 600);
    }

    function findAnswer(q) {
        const lowerQ = q.toLowerCase();
        
        // Matematyka
        if(lowerQ.match(/[0-9]+[\+\-\*\/][0-9]+/)) {
            try { return "Wynik: <b>" + eval(lowerQ.match(/[0-9\+\-\*\/\(\)\.]+/)[0]) + "</b>"; } catch(e) {}
        }

        // Kod HTML
        if(q.includes('<') && q.includes('>')) {
            return `Wykryłem kod! <br><code class="code-box">${q.replace(/</g, '&lt;')}</code>`;
        }

        // Szukanie w pamięci
        const entry = memory.find(m => lowerQ.includes(m.key));
        if(entry) return entry.val;

        return "Nie mam tego w bazie. Skopiuj tekst z internetu i wklej go w panelu 'Ucz AI', abym zapamiętał!";
    }

    function addMsg(txt, type) {
        const box = document.getElementById('msgBox');
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        d.innerHTML = txt;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    }

    function refreshStatus() {
        const s = document.getElementById('status');
        s.innerHTML = "Wpisy w bazie: " + memory.length + "<br>" + memory.map(m => "• " + m.key).join("<br>");
    }

    function clearDB() {
        if(confirm("Usunąć całą wiedzę?")) {
            localStorage.removeItem('ai_brain');
            location.reload();
        }
    }

    window.onload = () => addMsg("System operacyjny AI gotowy. Czekam na instrukcje.", "ai");
</script>

</body>
</html>
