<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Math AI - Community Learning</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root { --bg: #0a0a0c; --side: #171717; --chat: #131314; --acc: #4facfe; --txt: #e3e3e3; --admin: #ff9f43; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--txt); height: 100vh; display: flex; overflow: hidden; }

        .sidebar { width: 280px; background: var(--side); display: flex; flex-direction: column; padding: 15px; border-right: 1px solid #333; transition: 0.3s; z-index: 100; }
        @media (max-width: 768px) { .sidebar { position: absolute; left: 0; transform: translateX(-100%); bottom:0; top:0; } .sidebar.active { transform: translateX(0); } }
        
        .nav-btn { background: #2b2b2b; border: 1px solid #444; color: white; padding: 12px; border-radius: 12px; cursor: pointer; margin-bottom: 10px; width: 100%; font-weight: bold; font-size: 0.9rem; }
        .admin-btn { border-color: var(--admin); color: var(--admin); margin-top: auto; opacity: 0.3; }
        .admin-btn:hover { opacity: 1; }

        .main { flex: 1; display: flex; flex-direction: column; background: var(--chat); }
        .header { padding: 15px; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; }
        #chat-content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; animation: slide 0.2s ease; }
        .ai { align-self: flex-start; background: #232324; border-bottom-left-radius: 2px; }
        .user { align-self: flex-end; background: var(--acc); color: #000; border-bottom-right-radius: 2px; font-weight: 500; }

        .input-area { padding: 15px; width: 100%; max-width: 800px; margin: 0 auto; }
        .input-box { background: #1e1f20; border-radius: 30px; padding: 5px 15px; display: flex; align-items: center; gap: 10px; border: 1px solid #444; }
        input[type="text"] { flex: 1; background: none; border: none; color: white; padding: 12px; outline: none; font-size: 16px; }

        #admin-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1c1c1e; padding: 25px; border-radius: 25px; border: 2px solid var(--admin); z-index: 1000; width: 90%; max-width: 400px; }
        .admin-field { width: 100%; padding: 12px; margin: 10px 0; background: #2c2c2e; border: 1px solid #444; color: white; border-radius: 10px; }
        @keyframes slide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div style="font-weight: bold; margin-bottom: 20px; color: var(--acc)">HISTORIA SESJI</div>
    <div id="historyList" style="flex:1; overflow-y:auto"></div>
    <button class="nav-btn admin-btn" onclick="openAdmin()">⚙️ PANEL UCZENIA</button>
</div>

<div class="main" onclick="closeSidebar()">
    <div class="header">
        <button onclick="event.stopPropagation(); toggleSidebar()" style="background:none; border:none; color:white; font-size:1.5rem">☰</button>
        <b style="letter-spacing: 1px">MATH <span style="color:var(--acc)">AI</span></b>
        <div id="cloud-status" style="font-size:0.6rem; color:#555">Połączono</div>
    </div>
    
    <div id="chat-content"></div>

    <div class="input-area">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Napisz wiadomość..." autocomplete="off" onkeypress="if(event.key==='Enter') solve()">
            <button onclick="solve()" style="background:none; border:none; color:var(--acc); font-size:1.5rem">➤</button>
        </div>
        <p style="font-size: 0.6rem; text-align: center; margin-top: 8px; color: #555;">Pisząc, ulepszasz algorytm AI. Dane są anonimowe.</p>
    </div>
</div>

<div id="admin-modal">
    <h3 style="color:var(--admin)">Uczenie AI (Admin)</h3>
    <input type="password" id="adminPass" class="admin-field" placeholder="Hasło...">
    <div id="admin-tools" style="display:none">
        <input type="text" id="trig" class="admin-field" placeholder="Gdy ktoś powie...">
        <input type="text" id="resp" class="admin-field" placeholder="Odpowiedz...">
        <button class="nav-btn" onclick="saveRule()" style="background:var(--admin); color:black">Zapisz regułę</button>
    </div>
    <button class="nav-btn" onclick="closeAdmin()">Zamknij</button>
</div>

<script>
    /* --- KONFIGURACJA GITHUB (TWOJE DANE) --- */
    const GH_TOKEN = "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";
    const GH_REPO = "TWOJ_NICK/NAZWA_REPO"; // TU WPISZ SWOJE DANE!
    const USER_ID = "User_" + Math.floor(Math.random() * 1000);
    /* ---------------------------------------- */

    let customRules = JSON.parse(localStorage.getItem('ai_rules')) || {};

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('active'); }
    function openAdmin() { document.getElementById('admin-modal').style.display = 'block'; }
    function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }

    document.getElementById('adminPass').addEventListener('input', function(e) {
        if(e.target.value === "213005789Qu#@") document.getElementById('admin-tools').style.display = 'block';
    });

    async function sendToCloud(u, a) {
        const url = `https://api.github.com/repos/${GH_REPO}/contents/info/chat_log.json`;
        try {
            let sha = ""; let logs = [];
            const res = await fetch(url, { headers: { "Authorization": `token ${GH_TOKEN}` } });
            if (res.ok) {
                const d = await res.json();
                sha = d.sha;
                logs = JSON.parse(decodeURIComponent(escape(atob(d.content))));
            }
            logs.push({ id: USER_ID, time: new Date().toLocaleString(), user: u, ai: a });
            await fetch(url, {
                method: "PUT",
                headers: { "Authorization": `token ${GH_TOKEN}` },
                body: JSON.stringify({
                    message: `Update from ${USER_ID}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(logs, null, 2)))),
                    sha: sha
                })
            });
            document.getElementById('cloud-status').innerText = "Zsynchronizowano";
        } catch(e) { console.error(e); }
    }

    function addMsg(txt, type) {
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        d.innerHTML = txt;
        document.getElementById('chat-content').appendChild(d);
        document.getElementById('chat-content').scrollTop = 99999;
    }

    function solve() {
        const inp = document.getElementById('userInput');
        const val = inp.value.trim();
        if(!val) return;
        addMsg(val, 'user');
        inp.value = '';
        document.getElementById('cloud-status').innerText = "Wysyłanie...";

        setTimeout(() => {
            let response = "";
            let q = val.toLowerCase();
            for(let k in customRules) { if(q.includes(k)) { response = customRules[k]; break; } }

            if(!response) {
                let clean = q.replace(/razy/g, "*").replace(/plus/g, "+").replace(/[a-ząćęłńóśźż?]/g, "").replace(/\s/g, "");
                try { response = clean ? `Wynik: <b>${math.evaluate(clean)}</b>` : "Cześć! Uczę się na podstawie tego, co piszesz."; }
                catch(e) { response = "Zapisz to prościej, np. 2+2."; }
            }
            addMsg(response, 'ai');
            sendToCloud(val, response);
        }, 600);
    }

    function saveRule() {
        const t = document.getElementById('trig').value.toLowerCase();
        const r = document.getElementById('resp').value;
        if(t && r) {
            customRules[t] = r;
            localStorage.setItem('ai_rules', JSON.stringify(customRules));
            sendToCloud("ADMIN_NEW_RULE", t + " -> " + r);
            alert("Dodano regułę!");
            closeAdmin();
        }
    }

    window.onload = () => addMsg("Witaj w systemie nauki MATH AI. Twoje pytania pomagają mi stać się mądrzejszym!", "ai");
</script>
</body>
</html>
