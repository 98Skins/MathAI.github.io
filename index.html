<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokalny Mózg AI - Analiza Treści</title>
    <style>
        :root { --accent: #00ffcc; --bg: #0a0b10; --card: #161b22; --text: #e6edf3; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* LEWY PANEL - CZAT */
        .chat-container { flex: 2; display: flex; flex-direction: column; border-right: 1px solid #30363d; }
        .chat-header { padding: 20px; background: var(--card); border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 14px; position: relative; }
        .bubble.ai { background: #21262d; align-self: flex-start; border: 1px solid #30363d; }
        .bubble.user { background: #238636; align-self: flex-end; color: white; }
        
        .code-view { background: #000; color: #58a6ff; padding: 10px; border-radius: 6px; font-family: monospace; margin-top: 10px; display: block; overflow-x: auto; border: 1px solid #30363d; }

        .input-bar { padding: 20px; background: var(--card); display: flex; gap: 10px; }
        #userIn { flex: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 8px; resize: none; height: 50px; }

        /* PRAWY PANEL - NAUKA */
        .brain-panel { flex: 1; background: var(--card); padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .brain-header { color: var(--accent); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; font-size: 14px; }
        
        .learning-zone { background: #0d1117; padding: 15px; border-radius: 10px; border: 1px solid var(--accent); }
        .big-input { width: 100%; height: 250px; background: #161b22; border: 1px solid #30363d; color: #8b949e; padding: 10px; border-radius: 6px; font-size: 12px; margin-bottom: 10px; }
        
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-learn { background: var(--accent); color: #000; width: 100%; }
        .btn-learn:hover { filter: brightness(1.2); box-shadow: 0 0 15px var(--accent); }

        .memory-stat { font-size: 11px; color: #8b949e; margin-top: 10px; }
        .tag-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        .tag { background: #21262d; padding: 3px 8px; border-radius: 10px; font-size: 10px; border: 1px solid #30363d; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <span>🤖 AI KODER: LOKALNY MÓZG</span>
            <span style="color: var(--accent); font-size: 12px;">STATUS: ONLINE</span>
        </div>
        <div class="messages" id="chatBox"></div>
        <div class="input-bar">
            <textarea id="userIn" placeholder="Zadaj pytanie o to, czego mnie nauczyłeś..."></textarea>
            <button class="btn" style="background: #238636; color: white;" onclick="send()">PYTAJ</button>
        </div>
    </div>

    <div class="brain-panel">
        <div class="brain-header">🧠 LABORATORIUM WIEDZY</div>
        
        <div class="learning-zone">
            <p style="font-size: 12px; margin-bottom: 8px;">Wklej treść (dokumentację, artykuł, kod):</p>
            <textarea class="big-input" id="sourceText" placeholder="Wklej tutaj potężną dawkę wiedzy..."></textarea>
            <input type="text" id="sourceKey" placeholder="Słowa kluczowe (np. JavaScript, Tablice)" style="width:100%; padding:8px; background:#161b22; border:1px solid #30363d; color:white; margin-bottom:10px; border-radius:6px;">
            <button class="btn btn-learn" onclick="processKnowledge()">NAUCZ MNIE TEGO</button>
        </div>

        <div class="brain-header">💾 ZAPAMIĘTANE TEMATY</div>
        <div class="memory-stat" id="memStatus">Pamięć pusta. Nakarm mnie wiedzą.</div>
        <div class="tag-list" id="tagList"></div>

        <button class="btn" style="background:#da3633; color:white; font-size:10px; margin-top:auto" onclick="resetBrain()">WYCZYŚĆ MÓZG</button>
    </div>

<script>
    // Baza danych w localStorage
    let brain = JSON.parse(localStorage.getItem('ai_deep_memory')) || [];

    // Funkcja nauki
    function processKnowledge() {
        const text = document.getElementById('sourceText').value.trim();
        let keys = document.getElementById('sourceKey').value.toLowerCase().trim();

        if (text.length < 10) return alert("Mordo, wklej konkretny tekst, a nie puste pole!");

        // Jeśli nie podano kluczy, spróbuj wyciągnąć pierwszy wyraz
        if (!keys) {
            keys = text.split(/\s+/)[0].toLowerCase().replace(/[^a-z]/g, '');
        }

        const newEntry = {
            id: Date.now(),
            tags: keys.split(',').map(t => t.trim()),
            content: text,
            date: new Date().toLocaleString()
        };

        brain.push(newEntry);
        localStorage.setItem('ai_deep_memory', JSON.stringify(brain));
        
        document.getElementById('sourceText').value = '';
        document.getElementById('sourceKey').value = '';
        
        renderTags();
        addMsg("<b>ANALIZA ZAKOŃCZONA:</b> Przyjąłem dane. Moja wiedza o <u>" + keys + "</u> została zaktualizowana. Możesz mnie teraz o to pytać.", "ai");
    }

    // Obsługa czatu
    function send() {
        const q = document.getElementById('userIn').value.trim();
        if(!q) return;

        addMsg(q, "user");
        document.getElementById('userIn').value = '';

        setTimeout(() => {
            const reply = searchInBrain(q);
            addMsg(reply, "ai");
        }, 600);
    }

    function searchInBrain(query) {
        const q = query.toLowerCase();
        
        // 1. Sprawdź czy to matematyka
        if (q.match(/[0-9]+[\+\-\*\/][0-9]+/)) {
            try { return "Wynik obliczenia: <b>" + eval(q.match(/[0-9\+\-\*\/\(\)\.]+/)[0]) + "</b>"; } catch(e) {}
        }

        // 2. Szukaj w bazie po tagach i treści
        let bestMatch = brain.find(entry => 
            entry.tags.some(tag => q.includes(tag)) || entry.content.toLowerCase().includes(q)
        );

        if (bestMatch) {
            // Jeśli treść wygląda na kod, wrzuć w ramkę
            if (bestMatch.content.includes('{') || bestMatch.content.includes('<')) {
                return `Znalazłem w mojej bazie następujące dane:<br><div class="code-view">${escapeHTML(bestMatch.content)}</div>`;
            }
            return `Oto co wiem na ten temat:<br><br>${bestMatch.content.substring(0, 1500)}${bestMatch.content.length > 1500 ? '...' : ''}`;
        }

        return "Niestety, nie mam tego w moich zwojach pamięci. Wklej treść dokumentacji w panelu po prawej, a natychmiast się tego nauczę!";
    }

    // Pomocnicze
    function addMsg(txt, type) {
        const box = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerHTML = txt;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function renderTags() {
        const list = document.getElementById('tagList');
        const status = document.getElementById('memStatus');
        list.innerHTML = '';
        
        if(brain.length === 0) {
            status.innerText = "Pamięć pusta.";
            return;
        }

        status.innerText = `W bazie znajduje się ${brain.length} bloków wiedzy.`;
        
        brain.forEach(entry => {
            entry.tags.forEach(tag => {
                const span = document.createElement('span');
                span.className = 'tag';
                span.innerText = tag;
                list.appendChild(span);
            });
        });
    }

    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]));
    }

    function resetBrain() {
        if(confirm("Mordo, na pewno chcesz zrobić mi lobotomię i usunąć całą wiedzę?")) {
            localStorage.removeItem('ai_deep_memory');
            brain = [];
            renderTags();
            location.reload();
        }
    }

    window.onload = () => {
        renderTags();
        addMsg("System gotowy. Jestem czystą kartą. Wklej treść dokumentacji po prawej, a przeanalizuję ją na poważnie.", "ai");
    };
</script>
</body>
</html>
