<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI KODER PRO - Mobile & PC</title>
    <style>
        :root { --accent: #00ffcc; --bg: #0a0b10; --card: #161b22; --text: #e6edf3; --user-msg: #238636; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        .main-header { 
            background: var(--card); padding: 15px; border-bottom: 1px solid #30363d; 
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .status-light { color: var(--accent); font-size: 12px; display: flex; align-items: center; gap: 5px; }
        .status-light::before { content: ''; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 5px var(--accent); }

        /* LAYOUT KONTEJNER */
        .app-layout { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* LEWY PANEL - CZAT */
        .chat-container { 
            flex: 2; display: flex; flex-direction: column; background: var(--bg); 
            transition: all 0.3s ease;
        }

        .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .bubble { max-width: 85%; padding: 12px; border-radius: 12px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .bubble.ai { background: #21262d; align-self: flex-start; border: 1px solid #30363d; }
        .bubble.user { background: var(--user-msg); align-self: flex-end; color: white; }
        
        .code-view { 
            background: #000; color: #58a6ff; padding: 10px; border-radius: 6px; 
            font-family: monospace; font-size: 12px; margin-top: 8px; overflow-x: auto; border: 1px solid #30363d; 
        }

        .input-bar { padding: 15px; background: var(--card); border-top: 1px solid #30363d; display: flex; gap: 10px; }
        #userIn { flex: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 8px; resize: none; height: 45px; }

        /* PRAWY PANEL - NAUKA */
        .brain-panel { 
            flex: 1; background: var(--card); border-left: 1px solid #30363d; 
            padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto;
            transition: transform 0.3s ease;
        }

        .learning-zone { background: #0d1117; padding: 15px; border-radius: 10px; border: 1px solid var(--accent); }
        .big-input { width: 100%; height: 150px; background: #161b22; border: 1px solid #30363d; color: #e6edf3; padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 10px; }
        
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-learn { background: var(--accent); color: #000; width: 100%; }
        .btn-toggle { display: none; background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 5px 10px; }

        /* MEDIA QUERIES - NA TELEFON */
        @media (max-width: 850px) {
            .btn-toggle { display: block; }
            .brain-panel { 
                position: absolute; right: 0; top: 0; bottom: 0; width: 85%; 
                transform: translateX(100%); z-index: 50; box-shadow: -10px 0 20px rgba(0,0,0,0.5);
            }
            .brain-panel.active { transform: translateX(0); }
            .chat-container { flex: 1; }
        }

        .tag { background: #21262d; padding: 4px 8px; border-radius: 6px; font-size: 11px; border: 1px solid #30363d; display: inline-block; margin: 2px; }
    </style>
</head>
<body>

    <header class="main-header">
        <div style="font-weight: bold;">MÓZG-AI <span style="color:var(--accent)">v3.0</span></div>
        <div class="status-light" id="statusLabel">ONLINE</div>
        <button class="btn btn-toggle" onclick="toggleBrain()">NAUKA 🧠</button>
    </header>

    <div class="app-layout">
        <div class="chat-container">
            <div class="messages" id="chatBox"></div>
            <div class="input-bar">
                <textarea id="userIn" placeholder="Pytaj o cokolwiek..."></textarea>
                <button class="btn" style="background: var(--user-msg); color: white;" onclick="send()">WYŚLIJ</button>
            </div>
        </div>

        <div class="brain-panel" id="brainPanel">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="color:var(--accent); font-size:14px;">WGRAJ WIEDZĘ</h3>
                <button class="btn-toggle" style="border:none" onclick="toggleBrain()">❌</button>
            </div>
            
            <div class="learning-zone">
                <textarea class="big-input" id="sourceText" placeholder="Wklej tutaj treść ze strony (np. Wikipedia)..."></textarea>
                <input type="text" id="sourceKey" placeholder="Temat (np. JavaScript)" style="width:100%; padding:10px; background:#161b22; border:1px solid #30363d; color:white; margin-bottom:10px; border-radius:6px;">
                <button class="btn btn-learn" onclick="processKnowledge()">ZASSAJ WIEDZĘ</button>
            </div>

            <div style="font-size:12px; color:#8b949e;">TEMATY W BAZIE:</div>
            <div id="tagList"></div>
            
            <button class="btn" style="background:#da3633; color:white; font-size:10px; margin-top:auto" onclick="resetBrain()">Wyczyść Pamięć</button>
        </div>
    </div>

<script>
    let brain = JSON.parse(localStorage.getItem('ai_mobile_v3')) || [];

    function toggleBrain() {
        document.getElementById('brainPanel').classList.toggle('active');
    }

    function processKnowledge() {
        const text = document.getElementById('sourceText').value.trim();
        let keys = document.getElementById('sourceKey').value.toLowerCase().trim();

        if (text.length < 5) return alert("Za mało tekstu mordo!");

        const newEntry = {
            tags: keys ? keys.split(',') : ["ciekawostka"],
            content: text
        };

        brain.push(newEntry);
        localStorage.setItem('ai_mobile_v3', JSON.stringify(brain));
        
        document.getElementById('sourceText').value = '';
        document.getElementById('sourceKey').value = '';
        
        renderTags();
        if(window.innerWidth <= 850) toggleBrain();
        addMsg("<b>ANALIZA:</b> Przeanalizowałem tekst o <u>" + (keys || "nowym temacie") + "</u> i dodałem do bazy.", "ai");
    }

    function send() {
        const q = document.getElementById('userIn').value.trim();
        if(!q) return;
        addMsg(q, "user");
        document.getElementById('userIn').value = '';
        setTimeout(() => addMsg(searchInBrain(q), "ai"), 500);
    }

    function searchInBrain(query) {
        const q = query.toLowerCase();
        
        // Matematyka
        if (q.match(/[0-9]+[\+\-\*\/][0-9]+/)) {
            try { return "Wynik: <b>" + eval(q.match(/[0-9\+\-\*\/\(\)\.]+/)[0]) + "</b>"; } catch(e) {}
        }

        // Szukanie
        let match = brain.find(e => e.tags.some(t => q.includes(t.trim())) || e.content.toLowerCase().includes(q));

        if (match) {
            if (match.content.includes('{') || match.content.includes('<')) {
                return `Analiza kodu:<br><div class="code-view">${escapeHTML(match.content)}</div>`;
            }
            return `Oto co wiem:<br><br>${match.content.substring(0, 1000)}`;
        }
        return "Nie mam tego w bazie. Wklej treść w panelu 'NAUKA', abym mógł to przeanalizować.";
    }

    function addMsg(txt, type) {
        const box = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerHTML = txt;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function renderTags() {
        const list = document.getElementById('tagList');
        list.innerHTML = '';
        brain.forEach(e => e.tags.forEach(t => {
            const s = document.createElement('span');
            s.className = 'tag';
            s.innerText = t;
            list.appendChild(s);
        }));
    }

    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]));
    }

    function resetBrain() {
        if(confirm("Czyścimy wszystko?")) {
            localStorage.clear();
            location.reload();
        }
    }

    window.onload = () => {
        renderTags();
        addMsg("Siema! Wklej treść strony w panelu nauki, a przeanalizuję ją dla Ciebie.", "ai");
    };
</script>
</body>
</html>
