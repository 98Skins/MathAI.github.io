<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Lokalny AI - System Realnej Nauki</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex; gap: 0; justify-content: center; align-items: center; padding: 20px;
        }
        .container {
            background: #fff; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%; max-width: 1200px; overflow: hidden; display: flex; flex-direction: column;
        }
        .header { background: #16213e; color: white; padding: 15px; text-align: center; border-bottom: 3px solid #e94560; }
        .main-layout { display: flex; flex-direction: row; min-height: 600px; }
        @media (max-width: 900px) { .main-layout { flex-direction: column; } }

        /* CZAT */
        .chat-panel { flex: 1.5; display: flex; flex-direction: column; border-right: 1px solid #eee; background: #f8f9fa; }
        .chat-area { height: 500px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .message { display: flex; gap: 10px; max-width: 90%; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message-content { padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; }
        
        .code-snippet { 
            background: #2d2d2d; color: #f8f8f2; padding: 10px; border-radius: 8px; 
            font-family: 'Consolas', monospace; display: block; margin-top: 10px; 
            border-left: 4px solid #e94560; overflow-x: auto; text-align: left; font-size: 12px;
        }

        .message.ai .message-content { background: #e2e2e2; border-bottom-left-radius: 2px; color: #111; }
        .message.user .message-content { background: #e94560; color: white; border-bottom-right-radius: 2px; }
        
        .copy-btn { background: #ccc; border: none; cursor: pointer; font-size: 10px; padding: 3px 7px; border-radius: 4px; margin-top: 5px; opacity: 0; transition: 0.3s; }
        .copy-btn.visible { opacity: 1; }

        /* ADMIN */
        .admin-panel { flex: 1; background: #f1f1f1; padding: 20px; display: flex; flex-direction: column; gap: 15px; border-left: 1px solid #ddd; }
        .admin-section { display: none; flex-direction: column; gap: 15px; }
        .admin-section.active { display: flex; }
        
        .db-manager { background: white; border-radius: 10px; padding: 10px; max-height: 250px; overflow-y: auto; border: 1px solid #ddd; }
        .db-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 11px; }
        
        .btn { padding: 10px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; transition: 0.2s; }
        .btn:hover { opacity: 0.8; }
        .btn-blue { background: #0f3460; width: 100%; }
        .btn-green { background: #28a745; width: 100%; }
        .btn-web { background: #6a1b9a; width: 100%; margin-top: 5px; font-size: 11px; }

        textarea { width: 100%; height: 80px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-family: sans-serif; resize: vertical; }
        input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 5px; }
        
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #e94560; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h2>🤖 AI KODER PRO - Realne Uczenie</h2></div>
    <div class="main-layout">
        <div class="chat-panel">
            <div class="chat-area" id="chatArea"></div>
            <div class="input-area" style="padding:15px; display:flex; gap:10px; background: white; border-top: 1px solid #ddd;">
                <textarea id="userInput" placeholder="Wklej kod lub zadaj pytanie..."></textarea>
                <button class="btn btn-blue" onclick="sendMessage()" style="width:100px">Wyślij</button>
            </div>
        </div>

        <div class="admin-panel">
            <h3 style="text-align:center">⚙️ Zarządzanie Wiedzą</h3>
            
            <div id="loginView">
                <input type="password" id="adminPass" placeholder="Hasło administratora">
                <button class="btn btn-blue" onclick="login()" style="margin-top:10px">Zaloguj</button>
            </div>

            <div id="mainView" class="admin-section">
                <div style="font-weight: bold; font-size: 13px; color: #6a1b9a;">🌐 Pobierz wiedzę z URL:</div>
                <input type="text" id="webSource" placeholder="Link do dokumentacji (np. Wikipedia)">
                <button class="btn btn-web" id="learnBtn" onclick="learnFromWeb()">ANALIZUJ I ZAPAMIĘTAJ</button>
                
                <hr style="margin: 10px 0; border: 0.5px solid #ddd;">
                
                <div style="font-weight: bold; font-size: 13px;">Manualne Dodawanie:</div>
                <input type="text" id="newKW" placeholder="Słowa kluczowe (po przecinku)">
                <textarea id="newResp" placeholder="Treść odpowiedzi..."></textarea>
                <button class="btn btn-green" onclick="saveNew()">DODAJ WPIS</button>
                
                <div class="db-manager" id="dbList"></div>
                <button class="btn" style="background:#555; font-size:11px;" onclick="clearDB()">WYCZYŚĆ BAZĘ</button>
            </div>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('ai_real_db')) || [
        { keywords: ["siema", "cześć", "hej"], response: "Witaj! Jestem gotowy do nauki i analizy Twojego kodu." },
        { keywords: ["html", "css", "znaczniki"], response: "HTML to język znaczników. Jeśli wkleisz mi fragment kodu, sprawdzę czy nie ma błędów!" }
    ];
    
    const PASS = "213005789Qu#@";

    // --- FUNKCJA REALNEJ NAUKI Z SIECI ---
    async function learnFromWeb() {
        const url = document.getElementById('webSource').value;
        const btn = document.getElementById('learnBtn');
        if(!url) return alert("Podaj URL!");
        
        btn.disabled = true;
        btn.innerHTML = `<span class="loader"></span> Analizuję...`;
        addMsg(`Próbuję pobrać dane z: ${url}...`, false);

        try {
            // Korzystamy z AllOrigins aby ominąć blokadę CORS
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
            const response = await fetch(proxyUrl);
            const data = await response.json();
            const html = data.contents;

            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            
            // Pobieranie esencji strony
            const title = doc.querySelector('h1')?.innerText || doc.title || "Nowy temat";
            const paragraphs = Array.from(doc.querySelectorAll('p')).map(p => p.innerText).slice(0, 3).join(' ');
            
            if(paragraphs.length < 20) throw new Error("Za mało treści");

            const newEntry = {
                keywords: [title.toLowerCase().split(' ')[0], url.split('/').pop()],
                response: `Znalazłem informacje o "${title}": ${paragraphs.substring(0, 500)}... [Źródło: ${url}]`
            };

            db.push(newEntry);
            localStorage.setItem('ai_real_db', JSON.stringify(db));
            updateAdminList();
            addMsg(`Sukces! Nauczyłem się o: ${title}. Możesz teraz pytać o ten temat.`, false);
        } catch (e) {
            addMsg("Błąd pobierania. Ta strona może blokować dostęp lub wymagać logowania.", false);
        } finally {
            btn.disabled = false;
            btn.innerText = "ANALIZUJ I ZAPAMIĘTAJ";
        }
    }

    // --- ANALIZA KODU I MATEMATYKA ---
    function analyzeInput(input) {
        // Matematyka
        try {
            const mathMatch = input.match(/(\d+[\+\-\*\/\s]+\d+)/);
            if(mathMatch) {
                const res = eval(mathMatch[0]);
                return `Wynik obliczenia to: **${res}**`;
            }
        } catch(e) {}

        // Analiza kodu HTML
        if(input.includes('<') && input.includes('>')) {
            let report = "Wykryłem kod HTML. Analizuję...\n";
            if(!input.includes('</')) report += "⚠️ Uwaga: Wygląda na to, że zapomniałeś zamknąć niektóre tagi!\n";
            if(input.toLowerCase().includes('<script')) report += "🛡️ Bezpieczeństwo: Widzę tag <script>, zachowaj ostrożność.\n";
            return report + "Kod został zapisany w mojej pamięci sesyjnej.";
        }

        // Baza wiedzy
        const clean = input.toLowerCase();
        const found = db.find(item => item.keywords.some(k => clean.includes(k.toLowerCase())));
        return found ? found.response : "Nie mam tego w bazie. Możesz mnie tego nauczyć w panelu admina!";
    }

    // --- LOGIKA CZATU ---
    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]));
    }

    function typeEffect(element, btn, text) {
        let i = 0;
        let isCode = text.includes('<') && text.includes('>');
        if(isCode) {
            element.innerHTML = `<code class="code-snippet">${escapeHTML(text)}</code>`;
            btn.classList.add('visible');
            return;
        }
        function typing() {
            if (i < text.length) {
                element.innerHTML += escapeHTML(text.charAt(i));
                i++;
                setTimeout(typing, 10);
            } else { btn.classList.add('visible'); }
        }
        typing();
    }

    function addMsg(text, isUser) {
        const area = document.getElementById('chatArea');
        const m = document.createElement('div');
        m.className = `message ${isUser ? 'user' : 'ai'}`;
        const uid = "m" + Math.random().toString(36).substr(2, 9);
        const bid = "b" + Math.random().toString(36).substr(2, 9);

        m.innerHTML = `
            <div class="message-wrapper">
                <div class="message-content" id="${uid}">${isUser ? escapeHTML(text) : ''}</div>
                ${!isUser ? `<button class="copy-btn" id="${bid}" onclick="copyTxt('${uid}')">📋 Kopiuj</button>` : ''}
            </div>
        `;
        area.appendChild(m);
        area.scrollTop = area.scrollHeight;

        if(!isUser) typeEffect(document.getElementById(uid), document.getElementById(bid), text);
    }

    function sendMessage() {
        const input = document.getElementById('userInput');
        const val = input.value.trim();
        if(!val) return;
        addMsg(val, true);
        setTimeout(() => addMsg(analyzeInput(val), false), 600);
        input.value = '';
    }

    function copyTxt(id) {
        const txt = document.getElementById(id).innerText;
        navigator.clipboard.writeText(txt);
        alert("Skopiowano!");
    }

    // --- PANEL ADMINA ---
    function login() {
        if(document.getElementById('adminPass').value === PASS) {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('mainView').classList.add('active');
            updateAdminList();
        } else alert("Hasło niepoprawne!");
    }

    function updateAdminList() {
        const list = document.getElementById('dbList');
        list.innerHTML = db.map((item, index) => `
            <div class="db-item">
                <span>${item.keywords[0]}</span>
                <button onclick="removeItem(${index})" style="background:red; color:white; border:none; padding:2px 5px; border-radius:3px">X</button>
            </div>
        `).join('');
    }

    function saveNew() {
        const k = document.getElementById('newKW').value.split(',').map(s => s.trim());
        const r = document.getElementById('newResp').value;
        if(k[0] && r) {
            db.push({keywords: k, response: r});
            localStorage.setItem('ai_real_db', JSON.stringify(db));
            updateAdminList();
            alert("Dodano!");
        }
    }

    function removeItem(i) {
        db.splice(i, 1);
        localStorage.setItem('ai_real_db', JSON.stringify(db));
        updateAdminList();
    }

    function clearDB() {
        if(confirm("Czy na pewno chcesz usunąć całą zdobytą wiedzę?")) {
            localStorage.removeItem('ai_real_db');
            location.reload();
        }
    }

    window.onload = () => addMsg("System aktywny. Wklej kod do analizy lub użyj panelu admina, by pobrać wiedzę z internetu.", false);
</script>

</body>
</html>
